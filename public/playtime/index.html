<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娱乐时间 - keli-dog 的空间</title>
    <style>
        body {
            background: #0f172a;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f8fafc;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: #334155;
            border-color: #38bdf8;
        }

        .game-card h3 {
            margin-top: 0;
            color: #38bdf8;
        }

        .tool-list {
            list-style: none;
            padding: 0;
        }

        .tool-list li {
            margin-bottom: 12px;
        }

        .tool-list a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .tool-list a:hover {
            color: #fff;
        }

        .back-home {
            display: inline-block;
            margin-top: 50px;
            padding: 10px 30px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 700;
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #475569;
        }
    </style>
</head>

<body>
    <header class="top-header">
        <a href="/" class="logo"><span>🎮</span> keli-dog</a>
    </header>

    <div class="container">
        <h1 style="text-align: center; font-size: 48px; margin-bottom: 60px;">PLAYTIME</h1>

        <div class="game-grid">
            <div class="game-card">
                <h3>🎮 游戏推荐</h3>
                <p>最近在玩：</p>
                <ul style="padding-left: 20px; color: #94a3b8;">
                    <li>🌊 塞尔达传说</li>
                    <li>⚔️ 黑神话：悟空</li>
                    <li>🎯 APEX 英雄</li>
                </ul>
            </div>

            <div class="game-card">
                <h3>📺 常用工具</h3>
                <ul class="tool-list">
                    <li><a href="https://github.com" target="_blank">🔗 GitHub - 代码托管</a></li>
                    <li><a href="https://stackoverflow.com" target="_blank">🔗 Stack Overflow - 问答</a></li>
                    <li><a href="https://www.runoob.com" target="_blank">🔗 菜鸟教程 - 学习</a></li>
                </ul>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="/" class="back-home">返回主页</a>
        </div>
    </div>

    <footer>© 2026 keli-dog. All rights reserved.</footer>
</body>

</html>
