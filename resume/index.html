<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <title>个人简历 - keli-dog 的空间</title>
    <style>
        body {
            background: #f4f7f6;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #333;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            text-decoration: none;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .resume-section {
            margin-bottom: 40px;
        }

        .resume-section h2 {
            border-bottom: 2px solid #43e97b;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 15px;
            line-height: 1.6;
        }

        .label {
            font-weight: 700;
            color: #667eea;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .skill-tag {
            background: #f0fdf4;
            color: #166534;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #bbf7d0;
        }

        .back-home {
            display: inline-block;
            margin-top: 40px;
            padding: 10px 25px;
            background: #2c3e50;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>

                <div class="label">坐标：</div>

                <div class="label">邮箱：</div>
                <div>2695917656@qq.com</div>
                <div class="label">GitHub：</div>

                <span class="skill-tag">Vue</span><span class="skill-tag">Web Security</span><span

        <div style="text-align: center;">
